<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Por quê? 😭</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f9ff;
            --text-color: #2d3436;
            --accent: #ff7675;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
            text-align: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.07);
            padding: clamp(2rem, 6vw, 3rem) clamp(1.5rem, 5vw, 2.5rem);
            max-width: 420px;
            width: 92%;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .gif {
            width: 100%;
            max-width: 280px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: var(--accent);
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 8px;
        }

        p {
            font-size: clamp(0.95rem, 3.5vw, 1.05rem);
            color: #636e72;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
            font-size: clamp(1rem, 4vw, 1.1rem);
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,118,117,0.35);
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.06); }
    </style>
</head>
<body>
    <div class="card">
        <img class="gif" src="https://pa1.aminoapps.com/6851/21709492b8dbad4813e7fa07211ce0d8db5bd842_hq.gif" alt="Pato triste">
        <h1>Não? 😭</h1>
        <p>Tá bom... mas os patinhos ficaram muito tristes.<br>Tem certeza?</p>
        <button class="btn" onclick="window.location.href='index.html'">Pensei melhor 🥹</button>
    </div>
</body>
</html>
